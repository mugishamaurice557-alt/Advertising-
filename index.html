<!DOCTYPE html>
<html>
<head>
<title>School Social Platform</title>

<style>

body{
font-family:Arial;
background:#f0f2f5;
margin:0;
}

header{
background:#1877f2;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
width:500px;
margin:20px auto;
}

.postBox{
background:white;
padding:15px;
border-radius:5px;
}

input, textarea{
width:100%;
padding:8px;
margin:5px 0;
}

button{
background:#1877f2;
color:white;
border:none;
padding:8px;
width:100%;
margin-top:5px;
cursor:pointer;
}

.post{
background:white;
padding:10px;
margin-top:10px;
border-radius:5px;
}

.post img, .post video{
width:300px;
height:300px;
object-fit:cover;
border-radius:10px;
margin-top:10px;
display:block;
}

.actions{
display:flex;
gap:5px;
margin-top:10px;
}

.commentBox{
display:none;
}

</style>

</head>

<body>

<header>School Social Platform</header>

<div class="container">

<div class="postBox">

<input type="text" id="name" placeholder="Enter your name">

<textarea id="text" placeholder="Write your post"></textarea>

<label>Upload Image</label>
<input type="file" id="imageFile" accept="image/*">

<label>Upload Video</label>
<input type="file" id="videoFile" accept="video/*">

<button onclick="createPost()">Post</button>

</div>

<div id="posts"></div>

</div>

<script>

function createPost(){

let name=document.getElementById("name").value
let text=document.getElementById("text").value
let image=document.getElementById("imageFile").files[0]
let video=document.getElementById("videoFile").files[0]

if(name===""){
alert("Enter your name")
return
}

let posts=document.getElementById("posts")

let post=document.createElement("div")
post.className="post"

let content="<b>"+name+"</b><p>"+text+"</p>"

if(image){
let url=URL.createObjectURL(image)
content+="<img src='"+url+"'>"
}

if(video){
let url=URL.createObjectURL(video)
content+="<video controls src='"+url+"'></video>"
}

content+=`

<div class="actions">

<button class="likeBtn">👍 Like (<span>0</span>)</button>

<button class="commentBtn">💬 Comment</button>

</div>

<div class="commentBox">
<input placeholder="Write comment and press Enter">
<div class="comments"></div>
</div>

`

post.innerHTML=content

let likeBtn=post.querySelector(".likeBtn")
let likeCount=likeBtn.querySelector("span")

likeBtn.onclick=function(){
likeCount.innerText=parseInt(likeCount.innerText)+1
}

let commentBtn=post.querySelector(".commentBtn")
let commentBox=post.querySelector(".commentBox")

commentBtn.onclick=function(){

if(commentBox.style.display==="none"){
commentBox.style.display="block"
}else{
commentBox.style.display="none"
}

}

let commentInput=post.querySelector(".commentBox input")
let commentsDiv=post.querySelector(".comments")

commentInput.onkeydown=function(e){

if(e.key==="Enter"){

let c=document.createElement("p")
c.innerHTML="<b>"+name+":</b> "+commentInput.value

commentsDiv.appendChild(c)

commentInput.value=""

}

}

posts.prepend(post)

document.getElementById("text").value=""
document.getElementById("imageFile").value=""
document.getElementById("videoFile").value=""

}

</script>

</body>
</html>
